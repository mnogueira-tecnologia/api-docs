openapi: 3.0.0
info:
title: API de Consulta de CNPJ na Receita Federal
description: >
API para consulta e validação de dados cadastrais de empresas no Brasil.

```
Esta API utiliza processamento assíncrono.

Fluxo de uso:
1. Envie a requisição sem o parâmetro request_id para iniciar a consulta
2. A API retornará um request_id indicando que o processamento foi iniciado
3. Utilize o request_id em chamadas posteriores para obter o resultado da consulta
```

version: 1.0.0

servers:

* url: https://api.arquivo-nfe.com/prod

paths:
/cnpj_receita:
post:
summary: Consulta CNPJ na Receita Federal
description: >
Inicia ou consulta o resultado de uma requisição de CNPJ.

```
    - Sem request_id: inicia o processamento da consulta
    - Com request_id: retorna o resultado da consulta previamente iniciada

  parameters:
    - name: cnpj
      in: query
      required: true
      description: CNPJ com ou sem máscara
      schema:
        type: string
        example: "00.000.000/0001-91"

    - name: qsa
      in: query
      required: false
      description: Indica se deve retornar o quadro societário (QSA). 0 = não, 1 = sim
      schema:
        type: integer
        example: 0

    - name: request_id
      in: query
      required: false
      description: >
        Identificador da requisição assíncrona.
        Retornado na primeira chamada da API e deve ser informado
        para consultar o resultado posteriormente.
      schema:
        type: integer
        example: 12345

  security:
    - bearerAuth: []

  responses:
    '200':
      description: Retorno da consulta
      content:
        application/json:
          examples:
            processamento:
              summary: Consulta em processamento
              value:
                info: "Aguardando retorno da SEFAZ. Consulte novamente em instantes."
                request_id: 12345
            sucesso:
              summary: Consulta concluída
              value:
                numero_inscricao: "00000000000191"
                razao_nome: "EMPRESA EXEMPLO LTDA"
                fantasia: "EMPRESA EXEMPLO"
                situacao_cadastral: "ATIVA"

    '400':
      description: Requisição inválida

    '401':
      description: Não autorizado

    '500':
      description: Erro interno
```

components:
securitySchemes:
bearerAuth:
type: http
scheme: bearer
bearerFormat: JWT
